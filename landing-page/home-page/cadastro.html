<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="cadastro.css">
</head>

<body>

    <div class="container">

        <!-- LADO DA IMAGEM -->

        <section class="image-side"></section>

        <!-- LADO DO FORMULÁRIO -->

        <section class="login-side">

            <div class="login-box">

                <a href="index.html">
                    <img class="home-icon" src="/mind-up-main/landing-page-comercial/images/home-icon.png" alt="Voltar">
                </a>

                <h1>Criar Conta</h1>

                <p>Preencha os dados para se cadastrar</p>

                <form id="meuFormulario">

                    <input type="text" placeholder="Nome completo" required>

                    <input type="email" placeholder="Digite seu e-mail" required>

                    <input type="text" placeholder="Crie um usuário" required>

                    <input type="password" placeholder="Crie uma senha" required>

                    <input type="password" placeholder="Confirme sua senha" required>

                    <button type="submit">
                        Cadastrar
                    </button>

                    <button type="reset" class="secondary-btn">
                        Limpar dados
                    </button>

                </form>

                <p class="login-link">
                    Já possui uma conta?
                    <a href="login.html">Fazer login</a>
                </p>

            </div>

        </section>

    </div>

</body>

</html>
