<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="container">

        <!-- IMAGEM -->

        <section class="image-side"></section>

        <!-- LOGIN -->

        <section class="login-side">

            <div class="login-box">

                <a href="index.html">
                    <img class="home-icon" src="/mind-up-main/landing-page-comercial/images/home-icon.png" alt="Voltar">
                </a>

                <h1>Entrar</h1>

                <p>Faça login para acessar sua conta</p>

                <form action="#" method="post">

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Digite seu e-mail"
                        required
                    >

                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="Digite sua senha"
                        required
                    >

                    <button type="submit">
                        Entrar
                    </button>

                    <button type="reset" class="secondary-btn">
                        Limpar dados
                    </button>

                </form>

                <p class="login-link">
                    Não possui uma conta?
                    <a href="cadastro.html">Criar conta</a>
                </p>

            </div>

        </section>

    </div>

</body>

</html>
